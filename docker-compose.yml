services:
  postgres:
    image: postgres:16-alpine
    container_name: app_db
    environment:
      POSTGRES_USER: scrumno
      POSTGRES_PASSWORD: 3003
      POSTGRES_DB: app
    ports:
      # 5433 чтобы не конфликтовать с локальным PostgreSQL на хосте
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrumno -d app"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data: